stages:
  - install
  - test
  - report
  - upload

variables:
  PYTHON_VERSION: "3.13"
  ALLURE_VERSION: "2.24.1"
  ALLURE_RESULTS_DIR: "allure-results"
  ALLURE_REPORT_DIR: "allure-report"
  BASE_URL: "https://staging-seller.greatmall.uz"

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .cache/pip/

# ============================================================
# Stage 1: Install Dependencies
# ============================================================
install_dependencies:
  stage: install
  image: mcr.microsoft.com/playwright/python:v1.51.0-jammy
  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  before_script:
    - echo "Pipeline started for branch $CI_COMMIT_BRANCH"
    - python3 --version
  script:
    - echo "Installing Python dependencies..."
    - pip install --upgrade pip
    - pip install -r requirements.txt
    - echo "Dependencies installed successfully"
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# ============================================================
# Stage 2: Run Tests with Allure
# ============================================================
test_all:
  stage: test
  image: mcr.microsoft.com/playwright/python:v1.51.0-jammy
  before_script:
    - echo "Running all Playwright tests..."
    - pip install --upgrade pip
    - pip install -r requirements.txt
  script:
    - mkdir -p $ALLURE_RESULTS_DIR reports
    - pytest tests/ -v --headless --alluredir=$ALLURE_RESULTS_DIR --clean-alluredir --browser_name=chromium --url_name=$BASE_URL || echo "Some tests failed, continuing to report..."
    - echo "Test execution completed"
    - ls -la $ALLURE_RESULTS_DIR || echo "No allure results found"
  artifacts:
    when: always
    paths:
      - $ALLURE_RESULTS_DIR/
      - reports/
    expire_in: 7 days
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

test_smoke:
  stage: test
  image: mcr.microsoft.com/playwright/python:v1.51.0-jammy
  before_script:
    - pip install --upgrade pip
    - pip install -r requirements.txt
  script:
    - echo "Running smoke tests..."
    - mkdir -p $ALLURE_RESULTS_DIR reports
    - pytest tests/ -m smoke -v --headless --alluredir=$ALLURE_RESULTS_DIR --clean-alluredir --browser_name=chromium --url_name=$BASE_URL || echo "Some tests failed"
    - echo "Smoke tests completed"
  artifacts:
    when: always
    paths:
      - $ALLURE_RESULTS_DIR/
    expire_in: 3 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual

test_regression_nightly:
  stage: test
  image: mcr.microsoft.com/playwright/python:v1.51.0-jammy
  before_script:
    - pip install --upgrade pip
    - pip install -r requirements.txt
  script:
    - echo "Running nightly regression tests..."
    - mkdir -p $ALLURE_RESULTS_DIR reports
    - pytest tests/ -v --headless --alluredir=$ALLURE_RESULTS_DIR --clean-alluredir --browser_name=chromium --url_name=$BASE_URL --maxfail=20
  artifacts:
    when: always
    paths:
      - $ALLURE_RESULTS_DIR/
      - screenshots/
    expire_in: 30 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
  allow_failure: false

# ============================================================
# Stage 3: Generate Allure Report
# ============================================================
generate_allure_report:
  stage: report
  image: alpine:latest
  needs:
    - test_all
  before_script:
    - echo "Setting up Allure CLI..."
    - apk add --no-cache openjdk11-jre curl tar
    - curl -o allure-${ALLURE_VERSION}.tgz -L https://github.com/allure-framework/allure2/releases/download/${ALLURE_VERSION}/allure-${ALLURE_VERSION}.tgz
    - tar -zxvf allure-${ALLURE_VERSION}.tgz -C /opt/
    - ln -s /opt/allure-${ALLURE_VERSION}/bin/allure /usr/bin/allure
    - allure --version
  script:
    - echo "Generating Allure HTML report..."
    - allure generate $ALLURE_RESULTS_DIR -o $ALLURE_REPORT_DIR --clean
    - echo "Allure report generated successfully"
    - ls -la $ALLURE_REPORT_DIR
  artifacts:
    paths:
      - $ALLURE_REPORT_DIR/
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"
    - if: $CI_COMMIT_BRANCH == "main"

# ============================================================
# Stage 4: Upload to Allure TestOps
# ============================================================
upload_to_testops:
  stage: upload
  image: alpine:latest
  needs:
    - test_all
  before_script:
    - apk add --no-cache curl bash
    - curl -sL https://github.com/allure-framework/allurectl/releases/latest/download/allurectl_linux_amd64 -o allurectl
    - chmod +x allurectl
    - mv allurectl /usr/local/bin/
  script:
    - echo "Uploading results to Allure TestOps..."
    - echo "Endpoint - $ALLURE_ENDPOINT"
    - echo "Project ID - $ALLURE_PROJECT_ID"
    - test -d "$ALLURE_RESULTS_DIR" || (echo "No allure results directory!" && exit 1)
    - allurectl upload "$ALLURE_RESULTS_DIR" --endpoint "$ALLURE_ENDPOINT" --token "$ALLURE_TOKEN" --project-id "$ALLURE_PROJECT_ID" --launch-name "Seller Web - Build ${CI_PIPELINE_ID} (${CI_COMMIT_BRANCH})" --launch-tags "branch:${CI_COMMIT_BRANCH},pipeline:${CI_PIPELINE_ID},env:staging,playwright"
    - echo "Results uploaded to Allure TestOps"
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"
    - if: $CI_COMMIT_BRANCH == "main"
  when: always
  allow_failure: true

upload_smoke_to_testops:
  stage: upload
  image: alpine:latest
  needs:
    - test_smoke
  before_script:
    - apk add --no-cache curl bash
    - curl -sL https://github.com/allure-framework/allurectl/releases/latest/download/allurectl_linux_amd64 -o allurectl
    - chmod +x allurectl
    - mv allurectl /usr/local/bin/
  script:
    - echo "Uploading smoke test results to Allure TestOps..."
    - allurectl upload "$ALLURE_RESULTS_DIR" --endpoint "$ALLURE_ENDPOINT" --token "$ALLURE_TOKEN" --project-id "$ALLURE_PROJECT_ID" --launch-name "Smoke Tests - MR ${CI_MERGE_REQUEST_IID}" --launch-tags "smoke,merge-request,branch:${CI_COMMIT_BRANCH}"
    - echo "Smoke test results uploaded"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  when: on_success

upload_nightly_to_testops:
  stage: upload
  image: alpine:latest
  needs:
    - test_regression_nightly
  before_script:
    - apk add --no-cache curl bash
    - curl -sL https://github.com/allure-framework/allurectl/releases/latest/download/allurectl_linux_amd64 -o allurectl
    - chmod +x allurectl
    - mv allurectl /usr/local/bin/
  script:
    - echo "Uploading nightly regression results..."
    - allurectl upload "$ALLURE_RESULTS_DIR" --endpoint "$ALLURE_ENDPOINT" --token "$ALLURE_TOKEN" --project-id "$ALLURE_PROJECT_ID" --launch-name "Nightly Regression - $(date +%Y-%m-%d)" --launch-tags "regression,nightly,scheduled"
    - echo "Nightly results uploaded"
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
  when: always
