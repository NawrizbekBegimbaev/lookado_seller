[pytest]
pythonpath = .
markers =
    smoke: marks tests as smoke tests (core critical functionality tests - run with pytest -m smoke)
    regression: marks tests as regression tests (comprehensive tests - run with pytest -m regression)
    negative: marks tests as negative tests (testing invalid inputs/error cases)
    functional: marks tests as functional tests (complete workflow tests)
    api: marks tests as API tests (backend API endpoint tests)
    e2e: marks tests as E2E user journey tests (shared session, sequential flow)
    staging: marks tests for staging environment (run with pytest -m staging)
    boundary: marks tests as boundary value analysis tests (BVA edge cases)
    navigation: marks tests as navigation/state transition tests (workflow steps)
    security: marks tests as security tests (XSS, SQL injection, auth bypass)
    session: marks tests as session/authentication tests (login state, cookies)
    accessibility: marks tests as accessibility tests (ARIA, focus states, keyboard navigation)
    ui: marks tests as UI tests (user interface component tests)
    performance: marks tests as performance tests (load time, response time validation)
    whitespace: marks tests for whitespace handling (tabs, newlines, special characters)
    variants: marks tests for product variant scenarios
    bulkfill: marks tests for bulk fill/batch input scenarios
    price: marks tests for pricing-related scenarios
    robustness: marks tests for robustness/resilience scenarios
    validationux: marks tests for validation UX behavior
    concurrent: marks tests for concurrent/parallel operation scenarios
    order: marks test execution order within a page (pytest-order compatible)

# Test execution order for E2E user flow
# Tests run in this order: login → registration → becomeseller → productcreate → shopcreate
testpaths = tests

addopts =
    --strict-markers
    --tb=short
    --alluredir=allure-results
    --clean-alluredir
    -p no:pytest_order
    -p no:qase-pytest
    --dist=loadscope
